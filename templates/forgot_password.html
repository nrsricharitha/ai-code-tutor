{% extends "base.html" %}
{% set title = "Forgot Password - AI Code Tutor" %}

{% block content %}
<main class="auth-page">
    <form class="auth-card glass-panel" method="POST">
        <a class="brand center-brand" href="{{ url_for('index') }}">AI Code Tutor</a>
        <h1>Reset your password</h1>
        <p>Enter your registered email to continue.</p>

        {% if error %}
            <div class="alert">{{ error }}</div>
        {% endif %}

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required>

        <button class="primary-button full-button" type="submit">Continue</button>
        <p class="switch-link">Remembered it? <a href="{{ url_for('login') }}">Login</a></p>
    </form>
</main>
{% endblock %}
