{% extends "base.html" %}

{% block title %}Sign Up | AI Code Tutor{% endblock %}

{% block content %}
<main class="auth-screen">
    <section class="auth-card reveal">
        <a class="back-link" href="{{ url_for('home') }}">Back to home</a>
        <h1>Create account</h1>
        <p>Build your coding confidence with line-by-line explanations.</p>
        <form method="POST" autocomplete="off" class="form-grid">
            <label>
                <span>Full Name</span>
                <input type="text" name="full_name" autocomplete="off" placeholder="Enter your name" required>
            </label>
            <label>
                <span>Email</span>
                <input type="email" name="email" autocomplete="new-email" placeholder="you@example.com" required>
            </label>
            <label>
                <span>Password</span>
                <input type="password" name="password" autocomplete="new-password" placeholder="Create a password" required>
            </label>
            <label>
                <span>Confirm Password</span>
                <input type="password" name="confirm_password" autocomplete="new-password" placeholder="Confirm your password" required>
            </label>
            <button class="btn btn-primary" type="submit">Create Account</button>
        </form>
        <p class="switch-link">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
    </section>
</main>
{% endblock %}
