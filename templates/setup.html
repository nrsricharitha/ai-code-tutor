{% extends "base.html" %}

{% block title %}Setup | AI Code Tutor{% endblock %}

{% block content %}
<main class="auth-screen">
    <section class="auth-card reveal">
        <h1>Personalize learning</h1>
        <p>Choose your starting level and preferred explanation language.</p>
        <form method="POST" class="form-grid">
            <label>
                <span>Skill Level</span>
                <select name="skill_level" required>
                    {% for key, label in skill_levels.items() %}
                        <option value="{{ key }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>
                <span>Preferred Language</span>
                <select name="preferred_language" required>
                    {% for key, label in languages.items() %}
                        <option value="{{ key }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </label>
            <button class="btn btn-primary" type="submit">Continue to Dashboard</button>
        </form>
    </section>
</main>
{% endblock %}
