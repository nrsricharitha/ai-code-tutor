{% extends "base.html" %}

{% block title %}AI Code Tutor | Smart Programming Learning{% endblock %}

{% block content %}
<main class="landing-screen">
    <section class="hero-panel reveal">
        <div class="hero-circuit" aria-hidden="true"></div>
        <p class="eyebrow">AI-style programming mentor</p>
        <h1>AI Code Tutor</h1>
        <p class="hero-subtitle">Learn Programming the Smart Way with AI</p>
        <div class="hero-actions">
            <a class="btn btn-primary btn-large" href="{{ url_for('signup') }}">Get Started</a>
            <div class="auth-links">
                <span>Already have an account? <a href="{{ url_for('login') }}">Login</a></span>
                <span>New user? <a href="{{ url_for('signup') }}">Sign Up</a></span>
            </div>
        </div>
    </section>
</main>
{% endblock %}
