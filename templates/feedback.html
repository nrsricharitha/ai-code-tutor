{% extends "base.html" %}
{% block title %}Tutor Performance Evaluation Survey Feedback{% endblock %}
{% block content %}
<main class="dashboard-screen reveal" style="padding: 32px; display: grid; place-items: center;">
    <section class="auth-card">
        <h1>📝 Learning Platform Feedback Survey</h1>
        <p>Your reviews alter evaluation generation rules vectors securely.</p>
        
        <form method="POST" class="form-grid">
            <label>
                <span>Rate Pedagogy Explanation Effectiveness (1 - 5)</span>
                <input type="number" name="rating" min="1" max="5" value="5" required>
            </label>
            <label>
                <span>Report Evaluation Pipeline Anomalies / Text Errors</span>
                <input type="text" name="error_reported" placeholder="Specify any mismatched sentence logs or text descriptions...">
            </label>
            <label>
                <span>General Operational Comments</span>
                <textarea name="comments" placeholder="Write thoughts regarding classroom features adjustments directly..." style="min-height: 110px;"></textarea>
            </label>
            <button class="btn btn-primary" type="submit">Dispatch Feedback Portfolio Document</button>
        </form>
    </section>
</main>
{% endblock %}
