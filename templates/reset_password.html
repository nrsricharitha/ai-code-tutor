{% extends "base.html" %}
{% set title = "Create New Password - AI Code Tutor" %}

{% block content %}
<main class="auth-page">
    <form class="auth-card glass-panel" method="POST">
        <a class="brand center-brand" href="{{ url_for('index') }}">AI Code Tutor</a>
        <h1>Create new password</h1>
        <p>Choose a new password for {{ email }}.</p>

        {% if error %}
            <div class="alert">{{ error }}</div>
        {% endif %}

        <label for="password">New Password</label>
        <input id="password" name="password" type="password" placeholder="Create a new password" required>

        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" name="confirm_password" type="password" placeholder="Confirm new password" required>

        <button class="primary-button full-button" type="submit">Update Password</button>
        <p class="switch-link">Back to <a href="{{ url_for('login') }}">Login</a></p>
    </form>
</main>
{% endblock %}
