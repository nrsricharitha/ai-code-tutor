{% extends "base.html" %}
{% set title = "Login - AI Code Tutor" %}

{% block content %}
<main class="auth-page">
    <form class="auth-card glass-panel" method="POST">
        <a class="brand center-brand" href="{{ url_for('index') }}">AI Code Tutor</a>
        <h1>Welcome back</h1>
        <p>Login and continue practicing programming step by step.</p>

        {% if error %}
            <div class="alert">{{ error }}</div>
        {% endif %}

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Your password" required>

        <button class="primary-button full-button" type="submit">Login</button>
        <p class="switch-link">New here? <a href="{{ url_for('signup') }}">Create an account</a></p>
    </form>
</main>
{% endblock %}
