{% extends "base.html" %}
{% set title = "Sign Up - AI Code Tutor" %}

{% block content %}
<main class="auth-page">
    <form class="auth-card glass-panel" method="POST">
        <a class="brand center-brand" href="{{ url_for('index') }}">AI Code Tutor</a>
        <h1>Create your account</h1>
        <p>Start learning code with simple English and Telugu explanations.</p>

        {% if error %}
            <div class="alert">{{ error }}</div>
        {% endif %}

        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Your name" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Create a password" required>

        <button class="primary-button full-button" type="submit">Sign Up</button>
        <p class="switch-link">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </form>
</main>
{% endblock %}
